[project]
name = "c-two"
version = "0.4.1"
description = "C-Two is a resource-RPC framework that enables resource-oriented classes to be remotely invoked across different processes or machines."
readme = "README.md"
license-files = ["LICENSE"]
requires-python = ">=3.10"
dependencies = [
    "click>=8.2.1",
    "pydantic-settings>=2.0.0",
]

[dependency-groups]
dev = [
    "anthropic>=0.49.0",
    "httpx>=0.28.1",
    "numpy>=2.2.4",
    "openai>=1.76.0",
    "pandas>=2.2.3",
    "pillow>=12.1.1",
    "pyarrow>=23.0.1",
    "pytest>=8.0.0",
    "pytest-timeout>=2.0.0",
]

[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[tool.maturin]
manifest-path = "src/c_two/_native/bridge/c2-ffi/Cargo.toml"
module-name = "c_two._native"
python-source = "src"
features = ["pyo3/extension-module"]
include = ["LICENSE"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
timeout = 30

[tool.uv]
package = true
cache-keys = [
    { file = "pyproject.toml" },
    { file = "Cargo.toml" },
    { file = "src/c_two/_native/**/*.rs" },
    { file = "src/c_two/_native/**/Cargo.toml" },
]

[project.scripts]
c3 = "c_two.cli:cli"
