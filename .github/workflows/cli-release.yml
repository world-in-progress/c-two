name: CLI Release

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      should_publish_installer: ${{ steps.check.outputs.should_publish_installer }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check CLI release against GitHub Releases
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/scripts/check_cli_release.py

  build:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux-image: quay.io/pypa/manylinux2014_x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux-image: quay.io/pypa/manylinux2014_aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    name: c3 (${{ matrix.target }})
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build c3 CLI (manylinux)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/io" \
            -w /io \
            -e CARGO_TARGET_DIR=/io/cli/target \
            "${{ matrix.manylinux-image }}" \
            bash -lc 'curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal && source "$HOME/.cargo/env" && cargo build --manifest-path cli/Cargo.toml --release --target "${{ matrix.target }}"'

      - name: Build c3 CLI (native)
        if: startsWith(matrix.os, 'macos')
        run: |
          cargo build --manifest-path cli/Cargo.toml \
            --release --target "${{ matrix.target }}"

      - name: Package c3 CLI artifact
        shell: bash
        run: |
          mkdir -p cli-dist
          cp "cli/target/${{ matrix.target }}/release/c3" "cli-dist/c3-${{ matrix.target }}"
          (cd cli-dist && shasum -a 256 "c3-${{ matrix.target }}" > "c3-${{ matrix.target }}.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            cli-dist/c3-${{ matrix.target }}
            cli-dist/c3-${{ matrix.target }}.sha256

  installer:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true' || needs.version-check.outputs.should_publish_installer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Package c3 installer
        shell: bash
        run: |
          mkdir -p cli-dist
          cp cli/install-c3.sh cli-dist/c3-installer.sh

      - uses: actions/upload-artifact@v4
        with:
          name: cli-installer
          path: cli-dist/c3-installer.sh

  publish:
    needs: [version-check, build, installer]
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version-check.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: c3 ${{ needs.version-check.outputs.version }}
          files: dist/c3-*

  publish-installer:
    needs: [version-check, installer]
    if: needs.version-check.outputs.should_publish_installer == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cli-installer
          path: dist

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version-check.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: c3 ${{ needs.version-check.outputs.version }}
          files: dist/c3-installer.sh
